<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource_Park</title>

  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson@3"></script>

  <style>
    body {
      margin: 0;
      background: #000000;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 20px;
    }

    svg {
      background: radial-gradient(circle, #000000, #000);
    }
  </style>
</head>

<body>
  <h1></h1>
  <svg id="globe" width="600" height="600"></svg>

  <script>
    const width = 600;
    const height = 600;

    const svg = d3.select("#globe");

    const projection = d3.geoOrthographic()
      .scale(280)
      .translate([width / 2, height / 2])
      .clipAngle(90);

    const path = d3.geoPath().projection(projection);

    const g = svg.append("g");

    // 바다
    g.append("circle")
      .attr("cx", width / 2)
      .attr("cy", height / 2)
      .attr("r", projection.scale())
      .attr("fill", "#0a2a43");

    // 세계 지도 데이터
    d3.json("https://unpkg.com/world-atlas@2/countries-110m.json").then(data => {
      const countries = topojson.feature(data, data.objects.countries);

      g.selectAll("path")
        .data(countries.features)
        .enter()
        .append("path")
        .attr("d", path)
        .attr("fill", "#2ecc71")
        .attr("stroke", "#111")
        .attr("stroke-width", 0.5);

      // 자동 회전
      d3.timer((elapsed) => {
        projection.rotate([elapsed * 0.02, -15]);
        g.selectAll("path").attr("d", path);
      });
    });

    // 드래그 회전
    svg.call(
      d3.drag().on("drag", (event) => {
        const rotate = projection.rotate();
        const k = 0.25;

        projection.rotate([
          rotate[0] + event.dx * k,
          rotate[1] - event.dy * k
        ]);

        g.selectAll("path").attr("d", path);
      })
    );
  </script>
</body>
</html>
